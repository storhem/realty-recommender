[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "N", "B", "PLW"]
ignore = [
    "E501",    # длина строк контролируется вручную
    "B008",    # FastAPI: Depends() в сигнатуре — стандартный паттерн фреймворка
    "PLW0603", # Redis singleton через global — осознанный выбор
]

[tool.ruff.lint.per-file-ignores]
# SQLAlchemy forward references в строках — F821 не применим
"app/models/*.py" = ["F821"]
