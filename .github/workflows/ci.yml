name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:

  # ─── 1. Линтинг Python (ruff) ───────────────────────────────────────────────
  lint:
    name: Линтинг (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Установка ruff
        run: pip install ruff==0.6.9
      - name: Проверка кода
        working-directory: backend
        run: ruff check app/ tests/

  # ─── 2. Тесты бэкенда (pytest + coverage) ───────────────────────────────────
  test-backend:
    name: Тесты бэкенда
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: realty_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Установка зависимостей
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Применить миграции
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/realty_test
        run: alembic upgrade head

      - name: Запуск тестов
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/realty_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          STATS_SERVICE_URL: http://localhost:8080
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Загрузить отчёт покрытия (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: backend/htmlcov/
          retention-days: 7

      - name: Загрузить отчёт покрытия (XML для Codecov)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: backend/coverage.xml
          retention-days: 7

  # ─── 3. Тесты агента ─────────────────────────────────────────────────────────
  test-agent:
    name: Тесты агента
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Установка зависимостей агента
        working-directory: agent
        run: pip install -r requirements.txt pytest

      - name: Запуск тестов агента
        working-directory: agent
        run: pytest test_agent.py -v

  # ─── 4. Сборка Go-сервиса ────────────────────────────────────────────────────
  build-go:
    name: Сборка Go stats-service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: stats-service/go.sum

      - name: Сборка
        working-directory: stats-service
        run: go build -v ./...

      - name: Тесты Go
        working-directory: stats-service
        run: go test ./... -v

  # ─── 5. SAST — bandit ────────────────────────────────────────────────────────
  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Установка bandit
        run: pip install bandit==1.7.10
      - name: Анализ бэкенда
        working-directory: backend
        run: bandit -r app/ -ll -q
      - name: Анализ агента
        working-directory: agent
        run: bandit agent.py -ll -q

  # ─── 6. SCA — pip-audit ──────────────────────────────────────────────────────
  sca:
    name: SCA (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Аудит зависимостей бэкенда
        working-directory: backend
        run: |
          pip install pip-audit==2.7.3
          pip-audit -r requirements.txt || true
      - name: Аудит зависимостей агента
        working-directory: agent
        run: pip-audit -r requirements.txt || true
